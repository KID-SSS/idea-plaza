<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创意广场 - 发现创意，捕捉需求</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%); 
            min-height: 100vh; 
            color: #e8e8e8; 
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 40px 20px;
            text-align: center;
        }
        h1 { 
            font-size: 4rem; 
            background: linear-gradient(90deg, #00d9ff, #00ff88, #ffd700, #ff6b6b); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text; 
            margin-bottom: 20px; 
            font-weight: 800; 
        }
        .subtitle { 
            color: #888; 
            font-size: 1.4rem; 
            margin-bottom: 60px;
        }
        .plaza-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 60px;
        }
        .plaza-card {
            background: rgba(255,255,255,0.02);
            border-radius: 24px;
            padding: 50px 40px;
            border: 2px solid rgba(255,255,255,0.08);
            transition: all 0.4s ease;
            cursor: pointer;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }
        .plaza-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            transition: all 0.3s;
        }
        .plaza-card.ideas::before {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
        }
        .plaza-card.demands::before {
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
        }
        .plaza-card:hover {
            transform: translateY(-12px);
            border-color: rgba(255,255,255,0.2);
        }
        .plaza-card.ideas:hover {
            background: rgba(0,217,255,0.08);
            box-shadow: 0 25px 50px rgba(0,217,255,0.2);
        }
        .plaza-card.demands:hover {
            background: rgba(255,215,0,0.08);
            box-shadow: 0 25px 50px rgba(255,215,0,0.2);
        }
        .plaza-icon {
            font-size: 5rem;
            margin-bottom: 25px;
            display: block;
        }
        .plaza-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .plaza-card.ideas .plaza-title {
            color: #00ff88;
        }
        .plaza-card.demands .plaza-title {
            color: #ffd700;
        }
        .plaza-desc {
            color: #999;
            font-size: 1rem;
            line-height: 1.6;
        }
        .plaza-stats {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .stat {
            text-align: center;
        }
        .stat-num {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .plaza-card.ideas .stat-num {
            color: #00d9ff;
        }
        .plaza-card.demands .stat-num {
            color: #ff6b6b;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #666;
        }
        footer {
            color: #555;
            font-size: 0.9rem;
        }
        footer a {
            color: #00d9ff;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .plaza-grid { grid-template-columns: 1fr; }
            .plaza-card { padding: 40px 30px; }
            .plaza-icon { font-size: 4rem; }
            .plaza-title { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏛️ 广场中心</h1>
    <p class="subtitle">Reddit 精选创意与真实用户需求 · 每日更新</p>
    
    <div class="plaza-grid">
        <a href="/ideas.html" class="plaza-card ideas">
            <span class="plaza-icon">🚀</span>
            <h2 class="plaza-title">创意广场</h2>
            <p class="plaza-desc">精选产品创意，深度分析，助你找到下一个项目灵感</p>
            <div class="plaza-stats">
                <div class="stat">
                    <div class="stat-num">10</div>
                    <div class="stat-label">今日创意</div>
                </div>
                <div class="stat">
                    <div class="stat-num">34</div>
                    <div class="stat-label">累计收录</div>
                </div>
            </div>
        </a>
        
        <a href="/demands.html" class="plaza-card demands">
            <span class="plaza-icon">🎯</span>
            <h2 class="plaza-title">需求广场</h2>
            <p class="plaza-desc">挖掘真实用户痛点，发现创业机会，解决真问题</p>
            <div class="plaza-stats">
                <div class="stat">
                    <div class="stat-num">9</div>
                    <div class="stat-label">今日需求</div>
                </div>
                <div class="stat">
                    <div class="stat-num">21</div>
                    <div class="stat-label">累计收录</div>
                </div>
            </div>
        </a>
    </div>
    
    <footer>
        <p>💡 数据来源 Reddit · 每日自动更新</p>
    </footer>
</div>
</body>
</html>
